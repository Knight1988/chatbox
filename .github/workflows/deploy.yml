name: Docker Deploy

on:
  push:
    branches: [main, beta]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        run: corepack prepare pnpm@10.33.0 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store-dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ${{ steps.pnpm-cache.outputs.store-dir }}
          key: ${{ runner.os }}-deploy-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-deploy-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build web version
        run: pnpm build:web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: knight1988/chatbox
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CHATBOX_GOOGLE_CLIENT_ID_WEB=${{ secrets.CHATBOX_GOOGLE_CLIENT_ID_WEB }}
            CHATBOX_GOOGLE_CLIENT_ID_DESKTOP=${{ secrets.CHATBOX_GOOGLE_CLIENT_ID_DESKTOP }}
            CHATBOX_BASE_PATH=/chatbox/
          cache-from: type=registry,ref=knight1988/chatbox:buildcache
          cache-to: type=registry,ref=knight1988/chatbox:buildcache,mode=max

  deploy-dockge:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'beta'
    steps:
      - name: Redeploy via Dockge
        env:
          DOCKGE_URL: https://dk-server.linkpc.net/dockge
          STACK_NAME: chatbox
          DOCKGE_API_TOKEN: ${{ secrets.DOCKGE_API_TOKEN }}
        run: |
          set -euo pipefail
          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "Triggering Dockge update (pull + redeploy) for stack ${STACK_NAME}..."
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            HTTP_CODE=$(curl -sSL -o /tmp/dockge_response.json -w "%{http_code}" \
              -X POST --connect-timeout 30 --max-time 300 \
              -H "Authorization: Bearer $DOCKGE_API_TOKEN" \
              "${DOCKGE_URL}/api/stacks/${STACK_NAME}/update" 2>/tmp/dockge_curl_err.txt)
            CURL_EXIT=$?
            RESPONSE=$(cat /tmp/dockge_response.json 2>/dev/null || true)
            CURL_ERR=$(cat /tmp/dockge_curl_err.txt 2>/dev/null || true)
            echo "HTTP ${HTTP_CODE}: ${RESPONSE}${CURL_ERR}"
            if echo "$RESPONSE" | grep -q '"ok":[[:space:]]*true'; then
              echo "Dockge redeploy successful."
              exit 0
            fi
            echo "Attempt $i failed (curl exit ${CURL_EXIT}, HTTP ${HTTP_CODE})"
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done
          echo "All retry attempts failed."
          exit 1
